<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렌탈 견적서 발행</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Noto Sans KR",sans-serif; background:#f4f5f7; min-height:100vh; }
#inputScreen { padding:30px 20px 60px; max-width:780px; margin:0 auto; }
.top-bar { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.top-bar .logo { width:40px; height:40px; background:#1a3c5e; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; }
.top-bar h1 { font-size:20px; font-weight:700; color:#1a3c5e; }
.quote-num { margin-left:auto; font-size:12px; color:#888; background:#fff; border:1px solid #e0e0e0; border-radius:20px; padding:4px 14px; white-space:nowrap; }
.section { background:#fff; border-radius:14px; padding:22px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.section-title { font-size:13px; font-weight:700; color:#1a3c5e; margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid #e8f0fe; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:12px; font-weight:600; color:#555; }
.form-group input,.form-group textarea { padding:10px 12px; border:1.5px solid #e8e8e8; border-radius:8px; font-size:13px; font-family:inherit; outline:none; background:#fafafa; transition:border-color .2s; }
.form-group input:focus,.form-group textarea:focus { border-color:#1a3c5e; background:#fff; }
.form-group textarea { resize:vertical; min-height:70px; }
.optional-tag { font-size:10px; color:#aaa; font-weight:400; margin-left:4px; }
.items-header { display:grid; grid-template-columns:1.6fr 1.2fr 55px 110px 65px 120px 34px; gap:6px; padding:0 4px 8px; border-bottom:1px solid #eee; margin-bottom:8px; }
.items-header span { font-size:10px; font-weight:700; color:#888; text-align:center; line-height:1.4; }
.items-header span:first-child,.items-header span:nth-child(2) { text-align:left; }
.item-row { display:grid; grid-template-columns:1.6fr 1.2fr 55px 110px 65px 120px 34px; gap:6px; margin-bottom:6px; align-items:center; }
.item-row input { padding:9px 8px; border:1.5px solid #e8e8e8; border-radius:7px; font-size:12px; font-family:inherit; outline:none; background:#fafafa; width:100%; text-align:right; transition:border-color .2s; }
.item-row input.left { text-align:left; }
.item-row input:focus { border-color:#1a3c5e; background:#fff; }
.item-rental { font-size:12px; font-weight:700; color:#c0392b; text-align:right; padding:0 4px; }
.item-del { width:30px; height:30px; background:#fee2e2; border:none; border-radius:7px; color:#ef4444; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.btn-add-item { width:100%; padding:10px; background:#f0f4ff; border:1.5px dashed #c5d5f5; border-radius:8px; color:#1a3c5e; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; margin-top:8px; }
.total-section { background:#f0f5ff; border-radius:10px; padding:16px 18px; margin-top:14px; }
.total-row { display:flex; justify-content:space-between; padding:5px 0; font-size:13px; color:#555; }
.total-row.final { border-top:2px solid #1a3c5e; margin-top:8px; padding-top:12px; font-size:17px; font-weight:700; color:#1a3c5e; }
.vat-note { font-size:11px; color:#888; margin-top:6px; text-align:right; }
.btn-generate { width:100%; padding:18px; background:#1a3c5e; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; box-shadow:0 4px 14px rgba(26,60,94,.3); margin-top:8px; }
@media(max-width:640px){ .form-grid{grid-template-columns:1fr;} }
#previewScreen { display:none; padding:20px; background:#f4f5f7; min-height:100vh; }
.preview-actions { max-width:794px; margin:0 auto 16px; display:flex; gap:10px; }
.btn-back { padding:10px 20px; background:#fff; border:1.5px solid #ddd; border-radius:8px; font-size:13px; font-family:inherit; cursor:pointer; font-weight:600; color:#555; }
.btn-download { padding:10px 24px; background:#1a3c5e; border:none; border-radius:8px; font-size:13px; font-family:inherit; cursor:pointer; font-weight:700; color:#fff; box-shadow:0 3px 10px rgba(26,60,94,.25); }
.btn-download:disabled { background:#aaa; cursor:not-allowed; box-shadow:none; }
#quoteDoc { background:#fff; width:794px; margin:0 auto; padding:48px 52px; font-family:"Noto Sans KR",sans-serif; box-shadow:0 8px 30px rgba(0,0,0,.12); border-radius:4px; }
.q-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px; padding-bottom:18px; border-bottom:3px solid #1a3c5e; }
.q-title { font-size:30px; font-weight:700; color:#1a3c5e; letter-spacing:8px; }
.q-meta { text-align:right; font-size:12px; color:#666; line-height:2; }
.q-meta strong { color:#1a3c5e; display:inline-block; width:70px; }
.q-parties { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:22px; }
.q-party { border:1.5px solid #dde4f0; border-radius:8px; padding:14px 16px; }
.q-party-label { font-size:10px; font-weight:700; color:#fff; background:#1a3c5e; display:inline-block; padding:2px 10px; border-radius:20px; margin-bottom:8px; }
.q-party-name { font-size:15px; font-weight:700; color:#1a3c5e; margin-bottom:4px; }
.q-party-info { font-size:12px; color:#666; line-height:1.8; }
.q-summary { background:linear-gradient(135deg,#1a3c5e,#2d5f8a); color:#fff; border-radius:10px; padding:16px 22px; margin-bottom:22px; display:flex; justify-content:space-between; align-items:center; }
.q-summary .s-label { font-size:11px; opacity:.8; margin-bottom:3px; }
.q-summary .s-val { font-size:20px; font-weight:700; }
.q-summary .s-note { font-size:10px; opacity:.65; margin-top:2px; }
.q-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
.q-table thead th { background:#1a3c5e; color:#fff; padding:10px; font-size:11px; font-weight:600; text-align:center; }
.q-table thead th:first-child { text-align:left; }
.q-table tbody tr { border-bottom:1px solid #f0f0f0; }
.q-table tbody tr:nth-child(even) { background:#f8faff; }
.q-table tbody td { padding:10px; font-size:12px; text-align:center; color:#333; vertical-align:middle; }
.q-table tbody td:first-child { text-align:left; }
.q-table tbody td.model { color:#888; font-size:11px; margin-top:2px; }
.q-table tbody td.monthly { font-weight:600; color:#1a3c5e; }
.q-table tbody td.rental { font-weight:700; color:#c0392b; }
.q-totals { display:flex; justify-content:flex-end; margin-bottom:20px; }
.q-totals-box { width:290px; border:1.5px solid #dde4f0; border-radius:8px; overflow:hidden; }
.q-total-row { display:flex; justify-content:space-between; padding:9px 14px; font-size:13px; border-bottom:1px solid #f0f0f0; }
.q-total-row:last-child { border-bottom:none; }
.q-total-row.grand { background:#1a3c5e; color:#fff; font-weight:700; font-size:14px; }
.q-memo { background:#fffbf0; border:1px solid #ffe4a0; border-radius:8px; padding:14px 16px; margin-bottom:22px; }
.q-memo-title { font-size:11px; font-weight:700; color:#b8860b; margin-bottom:5px; }
.q-memo-content { font-size:12px; color:#555; line-height:1.8; }
.q-footer { border-top:1px solid #eee; padding-top:16px; display:flex; justify-content:space-between; align-items:flex-end; }
.q-footer .validity { font-size:11px; color:#999; line-height:1.9; }
.q-footer .issuer { text-align:right; }
.q-footer .issuer-co { font-size:14px; font-weight:700; color:#1a3c5e; }
.q-footer .issuer-person { font-size:13px; color:#444; margin-top:3px; }
.q-footer .issuer-phone { font-size:12px; color:#888; margin-top:2px; }
@media print { body{background:white;} #previewScreen{padding:0;background:white;} .preview-actions{display:none;} #quoteDoc{box-shadow:none;width:100%;padding:15mm 12mm;} }
@media(max-width:840px){ #quoteDoc{width:100%;padding:24px;} .q-parties{grid-template-columns:1fr;} }
    </style>
</head>
<body>
<div id="inputScreen">
    <div class="top-bar">
        <div class="logo">📋</div>
        <h1>렌탈 견적서 발행</h1>
        <div class="quote-num" id="quoteNumDisplay"></div>
    </div>
    <div class="section">
        <div class="section-title">🏢 발행처 (우리 회사)</div>
        <div class="form-grid">
            <div class="form-group"><label>회사명 <span style="color:red">*</span></label><input type="text" id="issuerName" placeholder="(주)정수기마켓"></div>
            <div class="form-group"><label>사업자등록번호 <span class="optional-tag">선택</span></label><input type="text" id="issuerBizNum" placeholder="000-00-00000"></div>
            <div class="form-group"><label>담당자명 <span style="color:red">*</span></label><input type="text" id="issuerPerson" placeholder="홍길동"></div>
            <div class="form-group"><label>연락처 <span class="optional-tag">선택</span></label><input type="text" id="issuerPhone" placeholder="010-0000-0000"></div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">👤 수신처 (고객)</div>
        <div class="form-grid">
            <div class="form-group"><label>고객명 / 회사명 <span style="color:red">*</span></label><input type="text" id="clientName" placeholder="홍길동 or (주)고객사"></div>
            <div class="form-group"><label>연락처 <span class="optional-tag">선택</span></label><input type="text" id="clientPhone" placeholder="010-0000-0000"></div>
            <div class="form-group full"><label>주소 <span class="optional-tag">선택</span></label><input type="text" id="clientAddress" placeholder="서울시 강남구 ..."></div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">📦 렌탈 품목 <span style="font-size:11px;font-weight:400;color:#888;margin-left:4px">(VAT 포함 기준)</span></div>
        <div class="items-header">
            <span>상품명</span><span>모델명</span><span>대수</span><span>월 렌탈료<br>(VAT포함)</span><span>약정<br>기간</span><span>약정<br>렌탈료</span><span></span>
        </div>
        <div id="itemList"></div>
        <button class="btn-add-item" onclick="addItem()">+ 제품 추가</button>
        <div class="total-section">
            <div class="total-row"><span>월 렌탈료 합계</span><span id="totalMonthly">0 원/월</span></div>
            <div class="total-row final"><span>💰 총 약정 렌탈료 (VAT포함)</span><span id="grandTotal">0 원</span></div>
            <div class="vat-note">※ 모든 금액은 부가세(VAT 10%) 포함 금액입니다</div>
        </div>
    </div>
    <div class="section">
        <div class="section-title">📝 메모 / 특이사항 <span class="optional-tag" style="font-size:12px">선택</span></div>
        <div class="form-group"><textarea id="memo" placeholder="렌탈 조건, 설치일정, 특이사항 등&#10;예) 설치비 무료 / 약정 종료 후 소유권 이전 가능"></textarea></div>
    </div>
    <button class="btn-generate" onclick="generateQuote()">📄 견적서 생성하기</button>
</div>

<div id="previewScreen">
    <div class="preview-actions">
        <button class="btn-back" onclick="goBack()">← 수정하기</button>
        <button class="btn-download" id="btnDownload" onclick="downloadPDF()">📥 PDF 저장하기</button>
    </div>
    <div id="quoteDoc"></div>
</div>

<script>
function genQuoteNum(){const d=new Date();const ymd=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;return `Q-${ymd}-${String(Math.floor(Math.random()*900)+100)}`;}
const QUOTE_NUM=genQuoteNum();
document.getElementById("quoteNumDisplay").textContent=`견적번호: ${QUOTE_NUM}`;
const today=new Date();
const dateStr=`${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
let itemCount=0;

function addItem(){
    itemCount++;
    const id=itemCount;
    const div=document.createElement("div");
    div.className="item-row";
    div.id=`item-${id}`;
    div.innerHTML=`
        <input type="text" class="left" placeholder="상품명 (예: 코웨이 정수기)" oninput="calcTotal()">
        <input type="text" class="left" placeholder="모델명 (예: CHP-7210N)" oninput="calcTotal()">
        <input type="number" placeholder="1" min="1" value="1" style="text-align:center" oninput="calcSub(${id});calcTotal()">
        <input type="number" placeholder="월렌탈료" min="0" oninput="calcSub(${id});calcTotal()">
        <input type="number" placeholder="36" min="1" value="36" style="text-align:center" oninput="calcSub(${id});calcTotal()">
        <div class="item-rental" id="sub-${id}">0</div>
        <button class="item-del" onclick="delItem(${id})">×</button>`;
    document.getElementById("itemList").appendChild(div);
    calcTotal();
}

function delItem(id){const el=document.getElementById(`item-${id}`);if(el)el.remove();calcTotal();}

function calcSub(id){
    const row=document.getElementById(`item-${id}`);
    if(!row)return{monthly:0,rental:0};
    const inputs=row.querySelectorAll("input");
    const qty=parseFloat(inputs[2].value)||0;
    const monthly=parseFloat(inputs[3].value)||0;
    const months=parseFloat(inputs[4].value)||0;
    const monthlyTotal=qty*monthly;
    const rental=monthlyTotal*months;
    document.getElementById(`sub-${id}`).textContent=rental.toLocaleString();
    return{monthly:monthlyTotal,rental};
}

function calcTotal(){
    const rows=document.querySelectorAll(".item-row");
    let tm=0,tr=0;
    rows.forEach(row=>{const id=parseInt(row.id.replace("item-",""));const{monthly,rental}=calcSub(id);tm+=monthly;tr+=rental;});
    document.getElementById("totalMonthly").textContent=tm.toLocaleString()+" 원/월";
    document.getElementById("grandTotal").textContent=tr.toLocaleString()+" 원";
}

function generateQuote(){
    const issuerName=document.getElementById("issuerName").value.trim();
    const issuerPerson=document.getElementById("issuerPerson").value.trim();
    const clientName=document.getElementById("clientName").value.trim();
    if(!issuerName||!issuerPerson){alert("회사명과 담당자명을 입력해주세요.");return;}
    if(!clientName){alert("고객명을 입력해주세요.");return;}
    const rows=document.querySelectorAll(".item-row");
    if(!rows.length){alert("제품을 하나 이상 추가해주세요.");return;}
    const issuerBizNum=document.getElementById("issuerBizNum").value.trim();
    const issuerPhone=document.getElementById("issuerPhone").value.trim();
    const clientPhone=document.getElementById("clientPhone").value.trim();
    const clientAddress=document.getElementById("clientAddress").value.trim();
    const memo=document.getElementById("memo").value.trim();
    let itemsHTML="";
    let totalMonthly=0,totalRental=0;
    rows.forEach((row,i)=>{
        const inputs=row.querySelectorAll("input");
        const productName=inputs[0].value.trim()||"(미입력)";
        const modelName=inputs[1].value.trim();
        const qty=parseFloat(inputs[2].value)||0;
        const monthly=parseFloat(inputs[3].value)||0;
        const months=parseFloat(inputs[4].value)||0;
        const monthlyTotal=qty*monthly;
        const rental=monthlyTotal*months;
        totalMonthly+=monthlyTotal;
        totalRental+=rental;
        itemsHTML+=`<tr>
            <td><div style="font-weight:600">${productName}</div>${modelName?`<div style="color:#888;font-size:11px;margin-top:2px">${modelName}</div>`:""}</td>
            <td>${qty}대</td>
            <td class="monthly">${monthly.toLocaleString()}원</td>
            <td>${months}개월</td>
            <td class="monthly">${monthlyTotal.toLocaleString()}원/월</td>
            <td class="rental">${rental.toLocaleString()}원</td>
        </tr>`;
    });
    document.getElementById("quoteDoc").innerHTML=`
        <div class="q-header"><div class="q-title">렌탈 견적서</div><div class="q-meta"><div><strong>견적번호</strong> ${QUOTE_NUM}</div><div><strong>발행일자</strong> ${dateStr}</div><div><strong>유효기간</strong> 발행일로부터 30일</div></div></div>
        <div class="q-parties">
            <div class="q-party"><div class="q-party-label">수 신</div><div class="q-party-name">${clientName} 귀하</div><div class="q-party-info">${clientPhone?"📞 "+clientPhone:""}${clientPhone&&clientAddress?"<br>":""}${clientAddress?"📍 "+clientAddress:""}${!clientPhone&&!clientAddress?"-":""}</div></div>
            <div class="q-party"><div class="q-party-label">발 신</div><div class="q-party-name">${issuerName}</div><div class="q-party-info">${issuerBizNum?"사업자등록번호: "+issuerBizNum+"<br>":""}담당자: ${issuerPerson}${issuerPhone?"<br>📞 "+issuerPhone:""}</div></div>
        </div>
        <div class="q-summary">
            <div><div class="s-label">월 렌탈료 합계 (VAT포함)</div><div class="s-val">${totalMonthly.toLocaleString()} 원/월</div></div>
            <div style="text-align:right"><div class="s-label">총 약정 렌탈료</div><div class="s-val">${totalRental.toLocaleString()} 원</div><div class="s-note">※ 부가세(VAT 10%) 포함</div></div>
        </div>
        <table class="q-table">
            <thead><tr><th style="width:28%">상품명 / 모델명</th><th style="width:8%">대수</th><th style="width:15%">월 렌탈료</th><th style="width:10%">약정기간</th><th style="width:17%">월 렌탈료 합계</th><th style="width:17%">약정 렌탈료</th></tr></thead>
            <tbody>${itemsHTML}</tbody>
        </table>
        <div class="q-totals"><div class="q-totals-box">
            <div class="q-total-row"><span>월 렌탈료 합계</span><span>${totalMonthly.toLocaleString()} 원/월</span></div>
            <div class="q-total-row grand"><span>총 약정 렌탈료</span><span>${totalRental.toLocaleString()} 원</span></div>
        </div></div>
        ${memo?`<div class="q-memo"><div class="q-memo-title">📌 메모 / 특이사항</div><div class="q-memo-content">${memo.replace(/
/g,"<br>")}</div></div>`:""}
        <div class="q-footer">
            <div class="validity">※ 본 견적서는 발행일로부터 <strong>30일간</strong> 유효합니다.<br>※ 모든 금액은 부가세(VAT 10%) <strong>포함</strong> 금액입니다.<br>※ 문의사항은 담당자에게 연락 주시기 바랍니다.</div>
            <div class="issuer"><div class="issuer-co">${issuerName}</div><div class="issuer-person">담당 : ${issuerPerson}</div>${issuerPhone?`<div class="issuer-phone">${issuerPhone}</div>`:""}</div>
        </div>`;
    window._quoteClient=clientName;
    window._quoteNum=QUOTE_NUM;
    document.getElementById("inputScreen").style.display="none";
    document.getElementById("previewScreen").style.display="block";
    window.scrollTo({top:0,behavior:"smooth"});
}

function goBack(){
    document.getElementById("previewScreen").style.display="none";
    document.getElementById("inputScreen").style.display="block";
    window.scrollTo({top:0,behavior:"smooth"});
}

async function downloadPDF(){
    const btn=document.getElementById("btnDownload");
    btn.disabled=true;btn.textContent="⏳ PDF 생성 중...";
    try{
        const el=document.getElementById("quoteDoc");
        const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#ffffff",logging:false});
        const imgData=canvas.toDataURL("image/jpeg",0.95);
        const{jsPDF}=window.jspdf;
        const pdf=new jsPDF({orientation:"p",unit:"mm",format:"a4"});
        const pW=pdf.internal.pageSize.getWidth();
        const pH=pdf.internal.pageSize.getHeight();
        const imgH=pW*(canvas.height/canvas.width);
        if(imgH<=pH){pdf.addImage(imgData,"JPEG",0,0,pW,imgH);}
        else{let y=0,r=imgH;while(r>0){pdf.addImage(imgData,"JPEG",0,-y,pW,imgH);r-=pH;y+=pH;if(r>0)pdf.addPage();}}
        pdf.save(`렌탈견적서_${window._quoteClient}_${window._quoteNum}.pdf`);
    }catch(e){alert("PDF 생성 오류: "+e.message);}
    finally{btn.disabled=false;btn.textContent="📥 PDF 저장하기";}
}
addItem();
</script>
</body>
</html>
